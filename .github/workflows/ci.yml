name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Go 1.26 toolchain
        run: |
          case "$(go env GOVERSION)" in
            go1.26.*) ;;
            *) echo "expected Go 1.26.x, got $(go env GOVERSION)"; exit 1 ;;
          esac

      - name: Run all tests
        run: go test ./...

      - name: Verify examples compile
        run: go test ./examples/...

      - name: Verify platform boundary
        run: |
          if grep -R -n -E 'agent-platform|ZenMind' --include='*.go' .; then
            echo "Go source must not import or reference platform-private names."
            exit 1
          fi
