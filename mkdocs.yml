site_name: ZenForge
site_description: A Go framework for application-owned AI agents
site_url: https://feiyu912.github.io/zenforge
repo_url: https://github.com/feiyu912/zenforge
repo_name: feiyu912/zenforge
edit_uri: edit/main/docs/
copyright: Copyright &copy; ZenForge contributors

docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys

plugins:
  - search

exclude_docs: |
  # Internal planning artifacts — must not be served publicly.
  s0-*.md
  s1-*.md
  s2-*.md
  s3-*.md
  s4-*.md
  s5-*.md
  s6-*.md
  s7-*.md
  s8-*.md
  s9-*.md
  mvp-*.md
  v0.1-release-plan.md
  current-project-mapping.md
  extraction-plan.md
  preparation-plan.md
  product-roadmap.md
  release-checklist.md
  vision.md
  api-sketch.md
  cli-design.md
  README.md
  *_test.go

nav:
  - Home: index.md
  - Get started:
      - Tutorial: tutorial.md
      - Quickstart: quickstart.md
  - Concepts:
      - Overview: concepts.md
      - Architecture: architecture.md
      - Failure Modes: failure-modes.md
      - Harness State Machine: harness-state-machine.md
  - How-to guides:
      - Embed as a library: sdk-guide.md
      - Write a tool: tool-authoring-guide.md
      - Add Agent Skills: agent-skills-spec.md
      - Configure approvals: approval-guide.md
      - Use a sandbox: sandbox-guide.md
      - Resume from checkpoints: checkpoint-resume-guide.md
      - Trace runs: trace-guide.md
      - Spawn subagents: subagent-guide.md
      - Plan then execute: planner-guide.md
      - Harden against attacks: security-guide.md
  - Reference:
      - API: api.md
      - Configuration: config-reference.md
      - Release Notes: release-notes-v0.1.md
      - Limitations: limitations.md
  - Integrations:
      - Model providers: provider-guide.md
      - MCP: mcp-adapter-guide.md
      - Memory: memory-adapter-guide.md
      - ZenMind: zenmind-adapter-guide.md
      - HTTP server: server-http-guide.md
      - SSE server: server-sse-guide.md
  - Examples: examples.md
  - ADRs:
      - Overview: adr/index.md
      - 0001 Event log and checkpoint: adr/0001-event-log-and-checkpoint.md
      - 0002 Public event contract: adr/0002-public-event-contract.md
      - 0003 Tool runtime: adr/0003-tool-runtime.md
      - 0004 Approval broker: adr/0004-approval-broker.md
      - 0005 Sub-agent orchestration: adr/0005-sub-agent-orchestration.md
      - 0006 Package layout: adr/0006-package-layout.md
      - 0007 Run state schema: adr/0007-run-state-schema.md
      - 0008 Tool result contract: adr/0008-tool-result-contract.md
      - 0009 Workspace policy separation: adr/0009-workspace-policy-separation.md
      - 0010 Shell deny by default: adr/0010-shell-deny-by-default.md
      - 0011 Harness receives normalized input: adr/0011-harness-receives-normalized-input.md
      - 0012 Model adapters own provider protocol: adr/0012-model-adapters-own-provider-protocol.md
      - 0013 Todo tools are core: adr/0013-todo-tools-are-core.md
      - 0014 Plan-execute is a preset: adr/0014-plan-execute-is-a-preset.md
      - 0015 Approval is core state: adr/0015-approval-is-core-state.md
      - 0016 No cross-run approval in MVP: adr/0016-no-cross-run-approval-in-mvp.md
      - 0017 Subagent is runtime tool: adr/0017-subagent-is-runtime-tool.md
      - 0018 Nested subagents disabled by default: adr/0018-nested-subagents-disabled-by-default.md
      - 0019 Sandbox is adapter: adr/0019-sandbox-is-adapter.md
      - 0020 No silent sandbox fallback: adr/0020-no-silent-sandbox-fallback.md
      - 0021 MVP does not require subagents or sandbox: adr/0021-mvp-does-not-require-subagents-or-sandbox.md
      - 0022 Agent Skills use progressive disclosure: adr/0022-agent-skills-progressive-disclosure.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/feiyu912/zenforge
      name: ZenForge on GitHub
  generator: false
